// Columns: [0]SA Focal [1]BU [2]Major BU [3]Cluster [4]Country [5]Client Segment
//          [6]Segment Activate [7]QUARTER [8]Month [9]Week [10]Initiative Type
//          [11]Status [12]Start Date [13]Duration [14]End Date [15]Save the Date
//          [16]Initiative Name [17]Marketing Name [18]Focus Offering
//          [19]Target Industry [20]Target Persona [21]Territories [22]BP Involved
//          [23]Responsable [24]# OI Plan [25]k($) Plan [26]SalesLoft Link
//          [27]RainFocus Link [28]Comments [29]OPP Strategy [30]SalesLoft Cadence Name
//          [31]# Contacts Reached [32]Meetings [33]Calls [34]Conversations
//          [35]Bounced Rate [36]Opened Rate [37]Clicked Rate [38]Replied Rate
//          [39]# OI Actual [40]k($) Actual [41]# OI Close Deals [42]k($) Close Deals
//          [43]Prospeccion

const C = {
  rep:0,bu:1,majorBU:2,cluster:3,country:4,segment:5,segActivate:6,
  quarter:7,month:8,week:9,type:10,status:11,startDate:12,
  name:16,mktName:17,offering:18,
  oiPlan:24,kPlan:25,slLink:26,rainFocus:27,oppStrategy:29,
  contacts:31,meetings:32,calls:33,conversations:34,
  bounced:35,opened:36,clicked:37,replied:38,
  oiActual:39,kActual:40,oiClose:41,kClose:42
};

const isNum = v => v !== null && v !== undefined && v !== "Pending" && v !== "" && !isNaN(Number(v));
const toNum = v => isNum(v) ? Number(v) : null;
const pct   = v => isNum(v) ? (Number(v)*100).toFixed(1)+"%" : "—";
const fmt   = v => (v === null || v === undefined || v === "Pending" || v === "") ? "—" : v;

let filters = { rep:"", quarter:"", month:"", cluster:"", majorBU:"", bu:"", status:"", type:"" };

function filteredData() {
  return RAW.filter(r => {
    if (filters.rep     && r[C.rep]     !== filters.rep)     return false;
    if (filters.quarter && r[C.quarter] !== filters.quarter) return false;
    if (filters.month   && String(r[C.month]) !== filters.month) return false;
    if (filters.cluster && r[C.cluster] !== filters.cluster) return false;
    if (filters.majorBU && r[C.majorBU] !== filters.majorBU) return false;
    if (filters.bu      && r[C.bu]      !== filters.bu)      return false;
    if (filters.status  && r[C.status]  !== filters.status)  return false;
    if (filters.type    && r[C.type]    !== filters.type)    return false;
    return true;
  });
}

function populateFilters() {
  const fill = (id, vals) => {
    const sel = document.getElementById(id);
    vals.forEach(v => { const o = document.createElement("option"); o.value = o.textContent = v; sel.appendChild(o); });
  };
  const monthOrder = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const sortMonths = arr => arr.sort((a,b) => {
    const ai = monthOrder.indexOf(a), bi = monthOrder.indexOf(b);
    if (ai >= 0 && bi >= 0) return ai - bi;
    if (ai >= 0) return -1; if (bi >= 0) return 1;
    return a < b ? -1 : 1;
  });
  fill("fRep",     [...new Set(RAW.map(r => r[C.rep]).filter(Boolean))].sort());
  fill("fQuarter", [...new Set(RAW.map(r => r[C.quarter]).filter(Boolean))].sort());
  fill("fMonth",   sortMonths([...new Set(RAW.map(r => String(r[C.month])).filter(v => v && v !== "null" && v !== "TBD"))]));
  fill("fCluster", [...new Set(RAW.map(r => r[C.cluster]).filter(Boolean))].sort());
  fill("fMajorBU", [...new Set(RAW.map(r => r[C.majorBU]).filter(Boolean))].sort());
  fill("fBU",      [...new Set(RAW.map(r => r[C.bu]).filter(Boolean))].sort());
  fill("fStatus",  [...new Set(RAW.map(r => r[C.status]).filter(Boolean))].sort());
  fill("fType",    [...new Set(RAW.map(r => r[C.type]).filter(Boolean))].sort());
}

function renderKPIs() {
  const data = filteredData();
  const total     = data.length;
  const byStatus  = s => data.filter(r => r[C.status] === s).length;
  const completed   = byStatus("Completed");
  const execution   = byStatus("Execution");
  const planned     = byStatus("Planned");
  const running     = byStatus("Running");
  const stuck       = byStatus("Stuck");

  const sumNum = col => data.reduce((a, r) => a + (toNum(r[col]) ?? 0), 0);
  const totalContacts = sumNum(C.contacts);
  const totalMeetings = sumNum(C.meetings);
  const totalCalls    = sumNum(C.calls);

  const rateRows = data.filter(r => isNum(r[C.opened]) && isNum(r[C.bounced]) && isNum(r[C.replied]));
  const avgRate = col => rateRows.length
    ? (rateRows.reduce((a,r) => a + Number(r[col]), 0) / rateRows.length * 100).toFixed(1) + "%"
    : "—";

  // Row 1: status KPIs (6 cards)
  // Row 2: activity KPIs — Meetings Booked first (left), then Contacts Reached, then Calls, then email rates
  const cards = [
    { label:"Total Initiatives", value: total,     sub:"",  color:"" },
    { label:"Completed",         value: completed, sub: total ? Math.round(completed/total*100)+"% of total" : "", color:"green" },
    { label:"In Execution",      value: execution, sub: total ? Math.round(execution/total*100)+"% of total" : "", color:"accent" },
    { label:"Planned",           value: planned,   sub: total ? Math.round(planned/total*100)+"% of total" : "",   color:"purple" },
    { label:"Running",           value: running,   sub: total ? Math.round(running/total*100)+"% of total" : "",   color:"orange" },
    { label:"Stuck",             value: stuck,     sub: total ? Math.round(stuck/total*100)+"% of total" : "",     color:"red" },
    // ── row 2 ──
    { label:"Contacts Reached",  value: totalContacts.toLocaleString(), sub:"total", color:"teal" },
    { label:"Meetings Booked",   value: totalMeetings.toLocaleString(), sub:"total", color:"" },
    { label:"Calls Made",        value: totalCalls.toLocaleString(),    sub:"total", color:"purple" },
    { label:"Avg Open Rate",     value: avgRate(C.opened),  sub:rateRows.length+" w/ data", color:"accent" },
    { label:"Avg Reply Rate",    value: avgRate(C.replied), sub:rateRows.length+" w/ data", color:"accent" },
    { label:"Avg Bounce Rate",   value: avgRate(C.bounced), sub:rateRows.length+" w/ data", color:"accent" },
  ];
  document.getElementById("kpiGrid").innerHTML = cards.map(c => `
    <div class="kpi-card${c.color ? " "+c.color : ""}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}</div>
      ${c.sub ? `<div class="kpi-sub">${c.sub}</div>` : ""}
    </div>`).join("");
}

function statusBadge(s) {
  const map = {
    "Completed":"completed","Execution":"execution","Planned":"planned",
    "Running":"running","Stuck":"stuck","Post Campaña":"postcampana"
  };
  const cls = map[s] || "other";
  return `<span class="badge badge-${cls}">${s||"—"}</span>`;
}

// Returns an array of ~5 round tick values spanning 0..maxVal
function niceTicks(maxVal) {
  const rawStep = maxVal / 5;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep || 1)));
  const step = [1,2,5,10].map(f => f * mag).find(s => s >= rawStep) || mag;
  const ticks = [];
  for (let v = 0; v <= maxVal + step * 0.5; v += step) ticks.push(v);
  return ticks;
}

// Renders gridlines + x-axis tick labels for horizontal bar charts.
// Returns an SVG string with <line> gridlines and <text> tick labels.
function makeGrid(ticks, scaleX, padT, H, padB, legendH) {
  const chartH = H - padB + legendH;
  return ticks.map(t => {
    const x = Math.round(scaleX(t));
    return `<line x1="${x}" y1="${padT}" x2="${x}" y2="${H - padB + 4}" stroke="#e5e7eb" stroke-width="1"/>
            <text x="${x}" y="${H - padB + 16}" text-anchor="middle" font-size="10" fill="#9ca3af">${t}</text>`;
  }).join("");
}

function renderChartRepTotal() {
  const data = filteredData();
  const reps = [...new Set(data.map(r => r[C.rep]).filter(Boolean))].sort();
  if (!reps.length) { document.getElementById("chartRepTotal").innerHTML = `<p class="no-data">No data for current filters.</p>`; return; }
  const maxLabelLen = Math.max(...reps.map(r => r.length));
  const padL = Math.min(220, Math.max(130, maxLabelLen * 7));
  const padR = 60, padT = 20, padB = 20;
  const barH = 22;
  const totals = reps.map(rep => data.filter(r => r[C.rep] === rep).length);
  const maxVal = Math.max(1, ...totals);
  const W = 700, H = padT + reps.length * (barH + 6) + padB;
  const scaleX = v => padL + (v / maxVal) * (W - padL - padR);
  let bars = "", labels = "";
  reps.forEach((rep, ri) => {
    const barY = padT + ri * (barH + 6);
    const barW = Math.max(0, scaleX(totals[ri]) - padL);
    labels += `<text x="${padL - 8}" y="${barY + barH/2 + 4}" text-anchor="end" font-size="11" fill="#1f2328">${rep}</text>`;
    bars += `<rect x="${padL}" y="${barY}" width="${barW}" height="${barH}" fill="#3b82d4" rx="2" opacity="0.85"/>`;
    if (totals[ri] > 0) bars += `<text x="${padL + barW + 6}" y="${barY + barH/2 + 4}" font-size="11" fill="#57606a">${totals[ri]}</text>`;
  });
  document.getElementById("chartRepTotal").innerHTML =
    `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px">${bars}${labels}</svg>`;
}

function renderChartType() {
  const data = filteredData();
  const types    = [...new Set(data.map(r => r[C.type]).filter(Boolean))].sort();
  const statuses = ["Completed","Execution","Running","Planned","Stuck","Post Campaña"];
  const colors   = { Completed:"#22c55e",Execution:"#3b82d4",Planned:"#9ca3af",Running:"#f59e0b",Stuck:"#ef4444","Post Campaña":"#7c5cd8" };
  if (!types.length) { document.getElementById("chartType").innerHTML = `<p class="no-data">No data for current filters.</p>`; return; }
  const activeStatuses = statuses.filter(s => data.some(r => r[C.status] === s));
  const barH = 20, groupH = barH * activeStatuses.length + 10, padL = 240, padR = 50, padT = 20, padB = 34;
  const maxVal = Math.max(1, ...types.flatMap(t => activeStatuses.map(s => data.filter(r => r[C.type]===t && r[C.status]===s).length)));
  const W = 700, H = padT + types.length * groupH + padB;
  const scaleX = v => padL + (v / maxVal) * (W - padL - padR);
  const ticks = niceTicks(maxVal);
  const legendRows = Math.ceil(activeStatuses.length / 3);
  const legendH = legendRows * 18 + 10;
  let grid = makeGrid(ticks, scaleX, padT, H, padB, 0);
  grid += `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H - padB + 4}" stroke="#d1d5db" stroke-width="1"/>`;
  let bars = "", labels = "";
  types.forEach((t, ti) => {
    const y0 = padT + ti * groupH;
    if (ti % 2 === 1) bars += `<rect x="${padL}" y="${y0}" width="${W - padL - padR}" height="${groupH}" fill="#f7f8fa" opacity="0.5"/>`;
    labels += `<text x="${padL - 8}" y="${y0 + groupH/2 + 4}" text-anchor="end" font-size="12" fill="#1f2328">${t}</text>`;
    activeStatuses.forEach((s, si) => {
      const count = data.filter(r => r[C.type]===t && r[C.status]===s).length;
      const barY = y0 + si * barH + 4;
      const barW = Math.max(0, scaleX(count) - padL);
      bars += `<rect x="${padL}" y="${barY}" width="${barW}" height="${barH-4}" fill="${colors[s]||'#ccc'}" rx="2" opacity="0.9"/>`;
      if (count > 0) bars += `<text x="${padL + barW + 4}" y="${barY + (barH-4)/2 + 4}" font-size="11" fill="#57606a">${count}</text>`;
    });
  });
  const legend = activeStatuses.map((s,i) =>
    `<rect x="${padL + (i%3)*160}" y="${H + legendH - legendRows*18 + Math.floor(i/3)*18}" width="12" height="12" fill="${colors[s]||'#ccc'}" rx="2"/>
     <text x="${padL + (i%3)*160 + 16}" y="${H + legendH - legendRows*18 + Math.floor(i/3)*18 + 10}" font-size="11" fill="#57606a">${s}</text>`
  ).join("");
  document.getElementById("chartType").innerHTML =
    `<svg viewBox="0 0 ${W} ${H + legendH}" style="width:100%;max-width:${W}px">${grid}${bars}${labels}${legend}</svg>`;
}

function renderChartQuarter() {

  const statuses = ["Completed","Execution","Running","Planned","Stuck","Post Campaña"];
  const colors   = { Completed:"#22c55e",Execution:"#3b82d4",Planned:"#9ca3af",Running:"#f59e0b",Stuck:"#ef4444","Post Campaña":"#7c5cd8" };

  const activeStatuses = statuses.filter(s => data.some(r => r[C.status] === s));
  const barH = 20, groupH = barH * activeStatuses.length + 10, padL = 80, padR = 50, padT = 20, padB = 34;
  const maxVal = Math.max(1, ...quarters.flatMap(q => activeStatuses.map(s => data.filter(r => r[C.quarter]===q && r[C.status]===s).length)));
  const W = 700, H = padT + quarters.length * groupH + padB;
  const scaleX = v => padL + (v / maxVal) * (W - padL - padR);
  const ticks = niceTicks(maxVal);
  const legendRows = Math.ceil(activeStatuses.length / 3);

  let grid = makeGrid(ticks, scaleX, padT, H, padB, 0);
  grid += `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H - padB + 4}" stroke="#d1d5db" stroke-width="1"/>`;
  let bars = "", labels = "";
  quarters.forEach((q, qi) => {
    const y0 = padT + qi * groupH;
    if (qi % 2 === 1) bars += `<rect x="${padL}" y="${y0}" width="${W - padL - padR}" height="${groupH}" fill="#f7f8fa" opacity="0.5"/>`;
    labels += `<text x="${padL - 8}" y="${y0 + groupH/2 + 4}" text-anchor="end" font-size="12" fill="#1f2328">${q}</text>`;
    activeStatuses.forEach((s, si) => {
      const count = data.filter(r => r[C.quarter]===q && r[C.status]===s).length;
      const barY = y0 + si * barH + 4;
      const barW = Math.max(0, scaleX(count) - padL);
      bars += `<rect x="${padL}" y="${barY}" width="${barW}" height="${barH-4}" fill="${colors[s]||'#ccc'}" rx="2" opacity="0.9"/>`;
      if (count > 0) bars += `<text x="${padL + barW + 4}" y="${barY + (barH-4)/2 + 4}" font-size="11" fill="#57606a">${count}</text>`;
    });
  });
  const legend = activeStatuses.map((s,i) =>
    `<rect x="${padL + (i%3)*160}" y="${H + legendH - legendRows*18 + Math.floor(i/3)*18}" width="12" height="12" fill="${colors[s]||'#ccc'}" rx="2"/>
     <text x="${padL + (i%3)*160 + 16}" y="${H + legendH - legendRows*18 + Math.floor(i/3)*18 + 10}" font-size="11" fill="#57606a">${s}</text>`
  ).join("");
  document.getElementById("chartQuarter").innerHTML =
    `<svg viewBox="0 0 ${W} ${H + legendH}" style="width:100%;max-width:${W}px">${grid}${bars}${labels}${legend}</svg>`;
}

function renderEngagement() {
  const data = filteredData();
  const types = [...new Set(data.map(r => r[C.type]).filter(Boolean))].sort();
  const rows = types.map(t => {
    const subset = data.filter(r => r[C.type] === t && isNum(r[C.opened]) && isNum(r[C.bounced]));
    if (!subset.length) return null;
    const avg = col => (subset.reduce((a,r) => a + Number(r[col]), 0) / subset.length * 100).toFixed(1) + "%";
    const sumC = col => subset.reduce((a,r) => a + (toNum(r[col])??0), 0);
    return { type:t, n:subset.length, contacts:sumC(C.contacts), meetings:sumC(C.meetings),
             open:avg(C.opened), click:avg(C.clicked), reply:avg(C.replied), bounce:avg(C.bounced) };
  }).filter(Boolean);
  if (!rows.length) { document.getElementById("engagementTable").innerHTML = `<p class="no-data">No numeric engagement data for current filters.</p>`; return; }
  document.getElementById("engagementTable").innerHTML = `
    <div class="table-scroll" style="max-height:none">
    <table class="eng-table" style="min-width:unset">
      <thead><tr>
        <th>Type</th><th># Initiatives</th><th>Total Contacts</th><th>Total Meetings</th>
        <th>Avg Open Rate</th><th>Avg Click Rate</th><th>Avg Reply Rate</th><th>Avg Bounce Rate</th>
      </tr></thead>
      <tbody>${rows.map(r => `<tr>
        <td>${r.type}</td><td class="num-cell">${r.n}</td>
        <td class="num-cell">${r.contacts.toLocaleString()}</td>
        <td class="num-cell">${r.meetings.toLocaleString()}</td>
        <td class="num-cell">${r.open}</td><td class="num-cell">${r.click}</td>
        <td class="num-cell">${r.reply}</td><td class="num-cell">${r.bounce}</td>
      </tr>`).join("")}</tbody>
    </table></div>`;
}

// ─── SORT STATE ───────────────────────────────────────────────────────────────
let sortCol = -1, sortDir = 1; // dir: 1=asc, -1=desc

// Column definitions for sorting: [header label, extractor fn]
const TABLE_COLS = [
  ["SA Rep",            r => r[C.rep] || ""],
  ["Quarter",           r => r[C.quarter] || ""],
  ["Month",             r => { const mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; const i=mo.indexOf(r[C.month]); return i>=0?i:99; }],
  ["Cluster",           r => r[C.cluster] || ""],
  ["Country",           r => r[C.country] || ""],
  ["BU",                r => r[C.bu] || ""],
  ["Type",              r => r[C.type] || ""],
  ["Status",            r => r[C.status] || ""],
  ["Initiative Name",   r => r[C.name] || ""],
  ["Contacts reached",  r => toNum(r[C.contacts]) ?? -1],
  ["Meetings",          r => toNum(r[C.meetings]) ?? -1],
  ["Calls",             r => toNum(r[C.calls]) ?? -1],
  ["Open Rate",         r => toNum(r[C.opened]) ?? -1],
  ["Click Rate",        r => toNum(r[C.clicked]) ?? -1],
  ["Reply Rate",        r => toNum(r[C.replied]) ?? -1],
  ["Tag in ISC",        r => r[C.oppStrategy] || ""],
  ["SalesLoft",         r => r[C.slLink] ? 1 : 0],
  ["RainFocus",         r => r[C.rainFocus] ? 1 : 0],
];

function renderTable() {
  let data = filteredData();
  document.getElementById("rowCount").textContent = `Showing ${data.length.toLocaleString()} of ${RAW.length.toLocaleString()} initiatives`;
  if (!data.length) { document.getElementById("initiativeTable").innerHTML = `<p class="no-data">No initiatives match the current filters.</p>`; return; }

  // Apply sort
  if (sortCol >= 0) {
    const extract = TABLE_COLS[sortCol][1];
    data = [...data].sort((a, b) => {
      const av = extract(a), bv = extract(b);
      if (av < bv) return -sortDir;
      if (av > bv) return  sortDir;
      return 0;
    });
  }

  const statusClass = s => ({
    "Completed":"row-completed","Execution":"row-execution","Planned":"row-planned",
    "Running":"row-running","Stuck":"row-stuck","Post Campaña":"row-postcampana"
  })[s] || "";
  const rows = data.map(r => {
    const slLink = r[C.slLink] ? `<a href="${r[C.slLink]}" target="_blank" rel="noopener">SL ↗</a>` : "—";
    const rfLink = r[C.rainFocus] ? `<a href="${r[C.rainFocus]}" target="_blank" rel="noopener">RF ↗</a>` : "—";
    const tag = fmt(r[C.oppStrategy]);
    const name = fmt(r[C.name]);
    return `<tr class="${statusClass(r[C.status])}">
      <td style="white-space:nowrap">${fmt(r[C.rep])}</td>
      <td style="white-space:nowrap">${fmt(r[C.quarter])}</td>
      <td>${fmt(r[C.month])}</td>
      <td>${fmt(r[C.cluster])}</td>
      <td>${fmt(r[C.country])}</td>
      <td>${fmt(r[C.bu])}</td>
      <td style="white-space:nowrap">${fmt(r[C.type])}</td>
      <td>${statusBadge(r[C.status])}</td>
      <td><span class="truncate" title="${name.replace(/"/g,"&quot;")}">${name}</span></td>
      <td class="num-cell">${isNum(r[C.contacts]) ? Number(r[C.contacts]).toLocaleString() : "—"}</td>
      <td class="num-cell">${isNum(r[C.meetings]) ? r[C.meetings] : "—"}</td>
      <td class="num-cell">${isNum(r[C.calls]) ? r[C.calls] : "—"}</td>
      <td class="num-cell">${pct(r[C.opened])}</td>
      <td class="num-cell">${pct(r[C.clicked])}</td>
      <td class="num-cell">${pct(r[C.replied])}</td>
      <td><span class="truncate" title="${tag}">${tag}</span></td>
      <td>${slLink}</td>
      <td>${rfLink}</td>
    </tr>`;
  }).join("");

  const headers = TABLE_COLS.map(([label], i) => {
    const cls = sortCol === i ? (sortDir === 1 ? " sort-asc" : " sort-desc") : "";
    return `<th class="${cls}" data-col="${i}">${label}</th>`;
  }).join("");

  document.getElementById("initiativeTable").innerHTML = `
    <table id="initTable">
      <thead><tr>${headers}</tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  // Wire up header click for sorting
  document.querySelectorAll("#initTable thead th").forEach(th => {
    th.addEventListener("click", () => {
      const col = parseInt(th.dataset.col);
      if (sortCol === col) { sortDir *= -1; } else { sortCol = col; sortDir = 1; }
      renderTable();
    });
  });
}

function renderAll() {
  renderKPIs(); renderChartRepTotal(); renderChartType(); renderChartQuarter(); renderEngagement(); renderTable();
}

const filterMap = {
  fRep:"rep",fQuarter:"quarter",fMonth:"month",fCluster:"cluster",
  fMajorBU:"majorBU",fBU:"bu",fStatus:"status",fType:"type"
};
Object.entries(filterMap).forEach(([id, key]) => {
  document.getElementById(id).addEventListener("change", e => { filters[key] = e.target.value; renderAll(); });
});
document.getElementById("btnReset").addEventListener("click", () => {
  filters = { rep:"", quarter:"", month:"", cluster:"", majorBU:"", bu:"", status:"", type:"" };
  Object.keys(filterMap).forEach(id => document.getElementById(id).value = "");
  renderAll();
});

populateFilters();
renderAll();
</script>
