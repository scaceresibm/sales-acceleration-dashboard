  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Filter bar */
  .filter-bar {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    padding: 14px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
    margin-bottom: 20px;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 11px; font-weight: 600; color: #57606a; text-transform: uppercase; letter-spacing: 0.04em; }
  .filter-group select {
    font-family: inherit;
    font-size: 13px;
    padding: 5px 10px;
    border: 1px solid #e5e7eb;
    border-radius: 4px;
    background: #fff;
    color: #1f2328;
    cursor: pointer;
    min-width: 160px;
  }
  .filter-group select:focus { outline: 2px solid #3b82d4; outline-offset: 1px; }
  .btn-reset {
    font-family: inherit;
    font-size: 12px;
    padding: 6px 14px;
    border: 1px solid #e5e7eb;
    border-radius: 4px;
    background: #fff;
    color: #57606a;
    cursor: pointer;
    align-self: flex-end;
  }
  .btn-reset:hover { background: #f7f8fa; }

  /* KPI cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    padding: 14px 16px;
  }
  .kpi-label { font-size: 11px; font-weight: 600; color: #57606a; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .kpi-value { font-size: 26px; font-weight: 700; color: #1f2328; line-height: 1.1; }
  .kpi-sub { font-size: 11px; color: #57606a; margin-top: 2px; }
  .kpi-card.accent .kpi-value { color: #3b82d4; }

  /* Status badges */
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .badge-completed { background: #dcfce7; color: #166534; }
  .badge-execution  { background: #dbeafe; color: #1e40af; }
  .badge-planned    { background: #f3f4f6; color: #374151; }
  .badge-other      { background: #fef9c3; color: #713f12; }

  /* Section card */
  .section-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .section-card h2 { margin-top: 0; }

  /* Charts */
  .chart-wrap { overflow-x: auto; }
  svg text { font-family: -apple-system, "Segoe UI", system-ui, sans-serif; }

  /* Email engagement table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: #f7f8fa;
    text-align: left;
    padding: 8px 10px;
    font-size: 11px;
    font-weight: 600;
    color: #57606a;
    border: 1px solid #e5e7eb;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  tbody td {
    padding: 7px 10px;
    border: 1px solid #e5e7eb;
    vertical-align: top;
  }
  tbody tr:nth-child(even) td { background: #f7f8fa; }
  tbody tr:hover td { background: #eff6ff; }

  /* Initiative table row borders */
  tr.row-completed td:first-child { border-left: 3px solid #22c55e; }
  tr.row-execution  td:first-child { border-left: 3px solid #3b82d4; }
  tr.row-planned    td:first-child { border-left: 3px solid #9ca3af; }

  /* Truncate long text */
  .truncate { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  a { color: #3b82d4; text-decoration: none; }
  a:hover { text-decoration: underline; }

  .no-data { color: #57606a; font-style: italic; padding: 16px 0; text-align: center; }

  footer {
    margin-top: 40px;
    padding-top: 12px;
    border-top: 1px solid #e5e7eb;
    text-align: center;
    font-size: 12px;
    color: #57606a;
  }

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const isNum = v => v !== null && v !== undefined && v !== "Pending" && v !== "" && !isNaN(Number(v));
const toNum = v => isNum(v) ? Number(v) : null;
const pct   = v => isNum(v) ? (Number(v)*100).toFixed(1)+"%" : "—";
const fmt   = v => (v === null || v === undefined || v === "Pending" || v === "") ? "—" : v;

// Column indices
const C = {
  rep:0,bu:1,majorBU:2,cluster:3,country:4,segment:5,segActivate:6,
  quarter:7,month:8,week:9,type:10,status:11,startDate:12,
  name:16,mktName:17,offering:18,
  oiPlan:24,kPlan:25,slLink:26,
  contacts:31,meetings:32,calls:33,conversations:34,
  bounced:35,opened:36,clicked:37,replied:38,
  oiActual:39
};

// ─── FILTER STATE ─────────────────────────────────────────────────────────────
let filters = { rep:"", quarter:"", status:"", type:"" };

function filteredData() {
  return RAW.filter(r => {
    if (filters.rep     && r[C.rep]     !== filters.rep)     return false;
    if (filters.quarter && r[C.quarter] !== filters.quarter) return false;
    if (filters.status  && r[C.status]  !== filters.status)  return false;
    if (filters.type    && r[C.type]    !== filters.type)    return false;
    return true;
  });
}

// ─── POPULATE FILTER DROPDOWNS ────────────────────────────────────────────────
function populateFilters() {
  const reps     = [...new Set(RAW.map(r => r[C.rep]).filter(Boolean))].sort();
  const quarters = [...new Set(RAW.map(r => r[C.quarter]).filter(Boolean))].sort();
  const statuses = [...new Set(RAW.map(r => r[C.status]).filter(Boolean))].sort();
  const types    = [...new Set(RAW.map(r => r[C.type]).filter(Boolean))].sort();

  const fill = (id, vals) => {
    const sel = document.getElementById(id);
    vals.forEach(v => { const o = document.createElement("option"); o.value = o.textContent = v; sel.appendChild(o); });
  };
  fill("fRep", reps);
  fill("fQuarter", quarters);
  fill("fStatus", statuses);
  fill("fType", types);
}

// ─── KPI CARDS ────────────────────────────────────────────────────────────────
function renderKPIs() {
  const data = filteredData();
  const total = data.length;
  const byStatus = s => data.filter(r => r[C.status] === s).length;
  const completed = byStatus("Completed");
  const execution = byStatus("Execution");
  const planned   = byStatus("Planned");

  const sumNum = col => data.reduce((a, r) => a + (toNum(r[col]) ?? 0), 0);
  const totalContacts  = sumNum(C.contacts);
  const totalMeetings  = sumNum(C.meetings);

  // Avg rates — only rows where the rate is a real number (not Pending/null)
  const rateRows = data.filter(r => isNum(r[C.opened]) && isNum(r[C.bounced]) && isNum(r[C.replied]));
  const avgRate = col => rateRows.length
    ? (rateRows.reduce((a,r) => a + Number(r[col]), 0) / rateRows.length * 100).toFixed(1) + "%"
    : "—";

  const cards = [
    { label:"Total Initiatives", value: total, sub:"" },
    { label:"Completed",  value: completed, sub: total ? Math.round(completed/total*100)+"% of total" : "", accent: false },
    { label:"In Execution", value: execution, sub: total ? Math.round(execution/total*100)+"% of total" : "" },
    { label:"Planned",    value: planned, sub: total ? Math.round(planned/total*100)+"% of total" : "" },
    { label:"Contacts Reached", value: totalContacts.toLocaleString(), sub:"total (numeric rows)" },
    { label:"Meetings Booked", value: totalMeetings.toLocaleString(), sub:"total (numeric rows)" },
    { label:"Avg Open Rate",   value: avgRate(C.opened),  sub:`${rateRows.length} initiatives`, accent:true },
    { label:"Avg Reply Rate",  value: avgRate(C.replied), sub:`${rateRows.length} initiatives`, accent:true },
    { label:"Avg Bounce Rate", value: avgRate(C.bounced), sub:`${rateRows.length} initiatives`, accent:true },
  ];

  document.getElementById("kpiGrid").innerHTML = cards.map(c => `
    <div class="kpi-card${c.accent ? " accent" : ""}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}</div>
      ${c.sub ? `<div class="kpi-sub">${c.sub}</div>` : ""}
    </div>`).join("");
}

// ─── BADGE ────────────────────────────────────────────────────────────────────
function statusBadge(s) {
  const map = { Completed:"completed", Execution:"execution", Planned:"planned" };
  const cls = map[s] || "other";
  return `<span class="badge badge-${cls}">${s}</span>`;
}

// ─── CHART: BY TYPE & STATUS ──────────────────────────────────────────────────
function renderChartType() {
  const data = filteredData();
  const types    = [...new Set(data.map(r => r[C.type]).filter(Boolean))].sort();
  const statuses = ["Completed","Execution","Planned"];
  const colors   = { Completed:"#22c55e", Execution:"#3b82d4", Planned:"#9ca3af" };

  if (!types.length) { document.getElementById("chartType").innerHTML = `<p class="no-data">No data for current filters.</p>`; return; }

  const barH = 28, groupH = barH * statuses.length + 16, padL = 230, padR = 40, padT = 20, padB = 30;
  const maxVal = Math.max(1, ...types.flatMap(t => statuses.map(s => data.filter(r => r[C.type]===t && r[C.status]===s).length)));
  const W = 660, H = padT + types.length * groupH + padB;
  const scaleX = (v) => padL + (v / maxVal) * (W - padL - padR);

  let bars = "", labels = "", axes = "";
  types.forEach((t, ti) => {
    const y0 = padT + ti * groupH;
    labels += `<text x="${padL - 8}" y="${y0 + groupH/2 + 4}" text-anchor="end" font-size="12" fill="#1f2328">${t}</text>`;
    statuses.forEach((s, si) => {
      const count = data.filter(r => r[C.type]===t && r[C.status]===s).length;
      const barY = y0 + si * barH + 4;
      const barW = Math.max(0, scaleX(count) - padL);
      bars += `<rect x="${padL}" y="${barY}" width="${barW}" height="${barH-4}" fill="${colors[s]}" rx="2" opacity="0.9"/>`;
      if (count > 0) bars += `<text x="${padL + barW + 4}" y="${barY + (barH-4)/2 + 4}" font-size="11" fill="#57606a">${count}</text>`;
    });
  });

  // legend
  const legend = statuses.map((s,i) =>
    `<rect x="${padL + i*110}" y="${H - 18}" width="12" height="12" fill="${colors[s]}" rx="2"/>
     <text x="${padL + i*110 + 16}" y="${H - 8}" font-size="11" fill="#57606a">${s}</text>`
  ).join("");

  document.getElementById("chartType").innerHTML =
    `<svg viewBox="0 0 ${W} ${H + 10}" style="width:100%;max-width:${W}px">${bars}${labels}${legend}</svg>`;
}

// ─── CHART: BY QUARTER ────────────────────────────────────────────────────────
function renderChartQuarter() {
  const data = filteredData();
  const quarters = [...new Set(data.map(r => r[C.quarter]).filter(Boolean))].sort();
  const statuses = ["Completed","Execution","Planned"];
  const colors   = { Completed:"#22c55e", Execution:"#3b82d4", Planned:"#9ca3af" };

  if (!quarters.length) { document.getElementById("chartQuarter").innerHTML = `<p class="no-data">No data for current filters.</p>`; return; }

  const barH = 28, groupH = barH * statuses.length + 16, padL = 80, padR = 40, padT = 20, padB = 40;
  const maxVal = Math.max(1, ...quarters.flatMap(q => statuses.map(s => data.filter(r => r[C.quarter]===q && r[C.status]===s).length)));
  const W = 660, H = padT + quarters.length * groupH + padB;
  const scaleX = (v) => padL + (v / maxVal) * (W - padL - padR);

  let bars = "", labels = "";
  quarters.forEach((q, qi) => {
    const y0 = padT + qi * groupH;
    labels += `<text x="${padL - 8}" y="${y0 + groupH/2 + 4}" text-anchor="end" font-size="12" fill="#1f2328">${q}</text>`;
    statuses.forEach((s, si) => {
      const count = data.filter(r => r[C.quarter]===q && r[C.status]===s).length;
      const barY = y0 + si * barH + 4;
      const barW = Math.max(0, scaleX(count) - padL);
      bars += `<rect x="${padL}" y="${barY}" width="${barW}" height="${barH-4}" fill="${colors[s]}" rx="2" opacity="0.9"/>`;
      if (count > 0) bars += `<text x="${padL + barW + 4}" y="${barY + (barH-4)/2 + 4}" font-size="11" fill="#57606a">${count}</text>`;
    });
  });

  const legend = statuses.map((s,i) =>
    `<rect x="${padL + i*110}" y="${H - 18}" width="12" height="12" fill="${colors[s]}" rx="2"/>
     <text x="${padL + i*110 + 16}" y="${H - 8}" font-size="11" fill="#57606a">${s}</text>`
  ).join("");

  document.getElementById("chartQuarter").innerHTML =
    `<svg viewBox="0 0 ${W} ${H + 10}" style="width:100%;max-width:${W}px">${bars}${labels}${legend}</svg>`;
}

// ─── EMAIL ENGAGEMENT TABLE ───────────────────────────────────────────────────
function renderEngagement() {
  const data = filteredData();
  const types = [...new Set(data.map(r => r[C.type]).filter(Boolean))].sort();

  const rows = types.map(t => {
    const subset = data.filter(r => r[C.type] === t && isNum(r[C.opened]) && isNum(r[C.bounced]));
    if (!subset.length) return null;
    const avg = col => (subset.reduce((a,r) => a + Number(r[col]), 0) / subset.length * 100).toFixed(1) + "%";
    return { type:t, n:subset.length, open:avg(C.opened), click:avg(C.clicked), reply:avg(C.replied), bounce:avg(C.bounced) };
  }).filter(Boolean);

  if (!rows.length) { document.getElementById("engagementTable").innerHTML = `<p class="no-data">No numeric engagement data for current filters.</p>`; return; }

  document.getElementById("engagementTable").innerHTML = `
    <table>
      <thead><tr>
        <th>Type</th><th># Initiatives</th>
        <th>Avg Open Rate</th><th>Avg Click Rate</th>
        <th>Avg Reply Rate</th><th>Avg Bounce Rate</th>
      </tr></thead>
      <tbody>${rows.map(r => `<tr>
        <td>${r.type}</td><td>${r.n}</td>
        <td>${r.open}</td><td>${r.click}</td>
        <td>${r.reply}</td><td>${r.bounce}</td>
      </tr>`).join("")}</tbody>
    </table>`;
}

// ─── INITIATIVE TABLE ─────────────────────────────────────────────────────────

  const rows = data.map(r => {
    const link = r[C.slLink]
      ? `<a href="${r[C.slLink]}" target="_blank" rel="noopener">Open ↗</a>`
      : "—";
    return `<tr class="${statusClass(r[C.status])}">
      <td>${fmt(r[C.rep])}</td>
      <td>${fmt(r[C.quarter])}</td>
      <td>${fmt(r[C.month])}</td>
      <td>${fmt(r[C.bu])}</td>
      <td>${fmt(r[C.country])}</td>
      <td>${fmt(r[C.type])}</td>
      <td>${statusBadge(r[C.status])}</td>
      <td class="truncate" title="${r[C.name]||""}">${fmt(r[C.name])}</td>
      <td style="text-align:right">${isNum(r[C.contacts]) ? Number(r[C.contacts]).toLocaleString() : "—"}</td>
      <td style="text-align:right">${isNum(r[C.meetings]) ? r[C.meetings] : "—"}</td>
      <td style="text-align:right">${isNum(r[C.calls]) ? r[C.calls] : "—"}</td>
      <td>${pct(r[C.opened])}</td>
      <td>${pct(r[C.clicked])}</td>
      <td>${pct(r[C.replied])}</td>
      <td>${link}</td>
    </tr>`;
  }).join("");

  document.getElementById("initiativeTable").innerHTML = `
    <table>
      <thead><tr>
        <th>SA Rep</th><th>Quarter</th><th>Month</th><th>BU</th><th>Country</th>
        <th>Type</th><th>Status</th><th>Initiative Name</th>
        <th>Contacts</th><th>Meetings</th><th>Calls</th>
        <th>Open Rate</th><th>Click Rate</th><th>Reply Rate</th><th>SalesLoft</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ─── RENDER ALL ───────────────────────────────────────────────────────────────
function renderAll() {
  renderKPIs();
  renderChartType();
  renderChartQuarter();
  renderEngagement();
  renderTable();
}

// ─── WIRE UP FILTERS ─────────────────────────────────────────────────────────
document.getElementById("fRep").addEventListener("change",     e => { filters.rep     = e.target.value; renderAll(); });
document.getElementById("fQuarter").addEventListener("change", e => { filters.quarter = e.target.value; renderAll(); });
document.getElementById("fStatus").addEventListener("change",  e => { filters.status  = e.target.value; renderAll(); });
document.getElementById("fType").addEventListener("change",    e => { filters.type    = e.target.value; renderAll(); });
document.getElementById("btnReset").addEventListener("click",  () => {
  filters = { rep:"", quarter:"", status:"", type:"" };
  ["fRep","fQuarter","fStatus","fType"].forEach(id => document.getElementById(id).value = "");
  renderAll();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
populateFilters();
renderAll();
</script>
</body>
</html>
